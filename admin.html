<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN — TRACKR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#05050a; --surface:#0a0a12; --card:#0e0e18;
    --border:#161625; --border2:#1f1f35;
    --accent:#00ff9d; --adim:rgba(0,255,157,.08);
    --accent2:#ff2d55; --accent3:#a855f7; --accent4:#0ea5e9;
    --text:#e8e8f2; --muted:#4a4a6a;
    --mono:'Space Mono',monospace; --sans:'Syne',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,157,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,.025) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
  .scan-line{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,157,.08),transparent);animation:scan 8s linear infinite;pointer-events:none;z-index:5;}
  @keyframes scan{0%{top:0}100%{top:100vh}}

  header{position:sticky;top:0;z-index:100;background:rgba(5,5,10,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:var(--sans);font-size:15px;font-weight:800;letter-spacing:.05em;}
  .logo span{color:var(--accent);}
  .hbadge{font-size:9px;letter-spacing:.2em;color:var(--muted);border:1px solid var(--border2);padding:2px 8px;border-radius:2px;text-transform:uppercase;}
  .hright{display:flex;align-items:center;gap:14px;}
  .live{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,157,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,255,157,0)}}
  .btn{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;border-radius:2px;}
  .btn:hover,.btn.primary{border-color:var(--accent);color:var(--accent);background:var(--adim);}
  .btn.danger{border-color:rgba(255,45,85,.4);color:var(--accent2);}
  .btn.danger:hover{background:rgba(255,45,85,.08);}

  main{position:relative;z-index:1;padding:28px 32px;max-width:1400px;margin:0 auto;}

  /* CONFIG */
  .config-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .cfg-label{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;min-width:80px;}
  .cfg-input{flex:1;font-family:var(--mono);font-size:10px;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:2px;outline:none;transition:border-color .2s;}
  .cfg-input:focus{border-color:var(--accent);}

  /* DEBUG */
  .debug-panel{background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden;}
  .debug-header{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .debug-title{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
  #debugBox{padding:8px 16px;max-height:120px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
  .dline{font-size:9px;padding:2px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;}
  .dline .dt{color:var(--muted);flex-shrink:0;}
  .dline.ok .dm{color:var(--accent);}
  .dline.err .dm{color:var(--accent2);}
  .dline.warn .dm{color:#f59e0b;}
  .dline.info .dm{color:var(--muted);}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat{background:var(--card);border:1px solid var(--border);padding:16px 20px;border-radius:4px;position:relative;overflow:hidden;}
  .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c,var(--accent)),transparent);opacity:.6;}
  .stat.c1{--c:var(--accent)}.stat.c2{--c:var(--accent2)}.stat.c3{--c:var(--accent3)}.stat.c4{--c:var(--accent4)}
  .stat-label{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .stat-val{font-family:var(--sans);font-size:28px;font-weight:800;line-height:1;}
  .stat-sub{font-size:9px;color:var(--muted);margin-top:4px;}

  /* GRID */
  .grid{display:grid;grid-template-columns:1fr 340px;gap:16px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .panel-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .panel-title{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
  .panel-count{font-size:10px;color:var(--muted);}

  /* ENTRIES */
  .entries-list{padding:10px;display:flex;flex-direction:column;gap:7px;max-height:72vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
  .ecard{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:13px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;}
  .ecard:hover{border-color:var(--border2);background:var(--card);}
  .ecard.active{border-color:var(--accent);background:var(--adim);}
  .ecard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);opacity:0;transition:opacity .2s;}
  .ecard.active::before{opacity:1;}
  .etop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .enum{font-family:var(--sans);font-size:11px;font-weight:700;color:var(--accent);}
  .etime{font-size:9px;color:var(--muted);}
  .eip{font-family:var(--sans);font-size:14px;font-weight:700;margin-bottom:6px;}
  .echips{display:flex;flex-wrap:wrap;gap:4px;}
  .echip{font-size:8px;letter-spacing:.08em;padding:2px 6px;border:1px solid var(--border2);border-radius:2px;color:var(--muted);text-transform:uppercase;}

  /* DETAIL */
  .detail-body{max-height:calc(72vh + 44px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:11px;gap:8px;letter-spacing:.1em;}
  .dsec{border-bottom:1px solid var(--border);}
  .dsec-head{padding:9px 16px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);background:var(--surface);display:flex;gap:6px;}
  .drows{padding:6px 16px;}
  .drow{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--border);gap:8px;}
  .drow:last-child{border-bottom:none;}
  .dk{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;}
  .dv{font-size:10px;text-align:right;word-break:break-all;}
  .dv.a1{color:var(--accent)}.dv.a2{color:var(--accent2)}.dv.a3{color:var(--accent3)}.dv.a4{color:var(--accent4)}

  .spinner{width:22px;height:22px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loadingState{text-align:center;padding:50px 20px;color:var(--muted);font-size:11px;letter-spacing:.1em;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--accent);color:var(--accent);font-size:10px;letter-spacing:.1em;padding:10px 16px;border-radius:3px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:200;}
  .toast.show{transform:translateY(0);opacity:1;}

  @media(max-width:900px){main{padding:16px;}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}header{padding:0 16px}}
</style>
</head>
<body>
<div class="scan-line"></div>
<header>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="logo">TRACK<span>R</span></div>
    <div class="hbadge">Admin Panel</div>
  </div>
  <div class="hright">
    <div class="live"><div class="dot"></div><span id="liveStatus">EN DIRECT</span></div>
    <button class="btn danger" onclick="clearAllData()">🗑 VIDER</button>
    <button class="btn primary" onclick="load()">↻ REFRESH</button>
  </div>
</header>

<main>
  <!-- Config -->
  <div class="config-row">
    <span class="cfg-label">MASTER KEY</span>
    <input class="cfg-input" id="keyInput" value="$2a$10$RJJzngRdsLcBKKX4li2F/.fzYp6hKnGmIn7XLfbKHkjLNJEfcfV3S" type="password">
    <button class="btn" onclick="toggleKey()">👁</button>
  </div>
  <div class="config-row" style="margin-bottom:16px;">
    <span class="cfg-label">BIN ID</span>
    <input class="cfg-input" id="binInput" placeholder="Auto-détecté depuis localStorage du tracker — ou colle l'ID ici">
    <button class="btn primary" onclick="load()">CHARGER</button>
  </div>

  <!-- Debug -->
  <div class="debug-panel">
    <div class="debug-header">
      <span class="debug-title">Console Debug</span>
      <button class="btn" onclick="document.getElementById('debugBox').innerHTML=''">CLEAR</button>
    </div>
    <div id="debugBox"><div class="dline info"><span class="dm">En attente…</span></div></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat c1"><div class="stat-label">Total visites</div><div class="stat-val" id="sTotal">—</div><div class="stat-sub">entrées stockées</div></div>
    <div class="stat c2"><div class="stat-label">Dernière visite</div><div class="stat-val" id="sLast" style="font-size:16px;padding-top:6px">—</div><div class="stat-sub" id="sLastSub">—</div></div>
    <div class="stat c3"><div class="stat-label">IPs uniques</div><div class="stat-val" id="sIPs">—</div><div class="stat-sub">adresses distinctes</div></div>
    <div class="stat c4"><div class="stat-label">OS majoritaire</div><div class="stat-val" id="sOS" style="font-size:16px;padding-top:6px">—</div><div class="stat-sub" id="sOSSub">—</div></div>
  </div>

  <!-- Content -->
  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Entrées</span>
        <span class="panel-count" id="eCount">—</span>
      </div>
      <div class="entries-list" id="eList">
        <div id="loadingState"><div class="spinner"></div><div>EN ATTENTE D'UN BIN ID…</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Détail</span>
        <span class="panel-count" id="dTitle">—</span>
      </div>
      <div class="detail-body" id="dPanel">
        <div class="detail-empty"><div style="font-size:22px">←</div><div>SÉLECTIONNER UNE ENTRÉE</div></div>
      </div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
const BIN_ID_KEY = "trackerr_bin_id";
// ═══════════════════════════════════════════

let allEntries = [];

function dbg(msg, type='info') {
  const box = document.getElementById('debugBox');
  const line = document.createElement('div');
  line.className = 'dline ' + type;
  line.innerHTML = `<span class="dt">${new Date().toLocaleTimeString('fr-FR')}</span><span class="dm">${msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleKey() {
  const i = document.getElementById('keyInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function getBinId() {
  const manual = document.getElementById('binInput').value.trim();
  if (manual) return manual;
  return localStorage.getItem(BIN_ID_KEY);
}

function detectBrowser(ua='') {
  if (ua.includes('Firefox')) return 'Firefox';
  if (ua.includes('Edg/')) return 'Edge';
  if (ua.includes('OPR')||ua.includes('Opera')) return 'Opera';
  if (ua.includes('Chrome')) return 'Chrome';
  if (ua.includes('Safari')) return 'Safari';
  return '?';
}
function detectOS(ua='') {
  if (ua.includes('Windows NT')) return 'Windows';
  if (ua.includes('Mac OS X')) return 'macOS';
  if (ua.includes('Android')) return 'Android';
  if (ua.includes('iPhone')||ua.includes('iPad')) return 'iOS';
  if (ua.includes('Linux')) return 'Linux';
  return '?';
}

function renderStats(entries) {
  document.getElementById('sTotal').textContent = entries.length;
  if (entries.length > 0) {
    const d = new Date(entries[0].timestamp || Date.now());
    document.getElementById('sLast').textContent = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('sLastSub').textContent = d.toLocaleDateString('fr-FR');
  }
  const ips = new Set(entries.map(e => e.reseau?.ip || e.meta?.ip).filter(Boolean));
  document.getElementById('sIPs').textContent = ips.size || '—';
  const oses = {};
  entries.forEach(e => { const os = detectOS(e.navigateur?.user_agent||''); oses[os]=(oses[os]||0)+1; });
  const top = Object.entries(oses).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('sOS').textContent = top?top[0]:'—';
  document.getElementById('sOSSub').textContent = top ? top[1]+' visite(s)' : '—';
}

function renderList(entries) {
  const list = document.getElementById('eList');
  list.innerHTML = '';
  document.getElementById('eCount').textContent = entries.length + ' entrée(s)';
  if (!entries.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:11px;letter-spacing:.1em">AUCUNE VISITE ENREGISTRÉE</div>';
    return;
  }
  entries.forEach((e, i) => {
    const ua = e.navigateur?.user_agent||'';
    const ip = e.reseau?.ip || e.meta?.ip || '?.?.?.?';
    const ts = new Date(e.timestamp||Date.now());
    const card = document.createElement('div');
    card.className = 'ecard';
    card.innerHTML = `
      <div class="etop">
        <span class="enum">#${String(entries.length-i).padStart(3,'0')}</span>
        <span class="etime">${ts.toLocaleTimeString('fr-FR')} · ${ts.toLocaleDateString('fr-FR')}</span>
      </div>
      <div class="eip">${ip}</div>
      <div class="echips">
        <span class="echip">${detectBrowser(ua)}</span>
        <span class="echip">${detectOS(ua)}</span>
        <span class="echip">${e.materiel?.ecran||'—'}</span>
        <span class="echip">${e.navigateur?.langue||'—'}</span>
        ${e.batterie?.level && e.batterie.level!=='N/A'?`<span class="echip">🔋${e.batterie.level}</span>`:''}
      </div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.ecard').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      renderDetail(e);
    });
    list.appendChild(card);
  });
}

function renderDetail(e) {
  document.getElementById('dTitle').textContent = e.reseau?.ip || e.meta?.ip || '—';
  const ua = e.navigateur?.user_agent||'';
  const sections = [
    { icon:'📡', label:'Meta', rows:[
      ['Timestamp', e.date_fr||e.timestamp, 'a1'],
      ['IP', e.reseau?.ip||e.meta?.ip, 'a1'],
      ['URL', e.meta?.url],
      ['Referrer', e.meta?.referrer||'direct'],
    ]},
    { icon:'🌐', label:'Navigateur', rows:[
      ['Navigateur', detectBrowser(ua), 'a4'],
      ['OS', detectOS(ua), 'a4'],
      ['Langue', e.navigateur?.langue],
      ['Toutes langues', e.navigateur?.langues],
      ['Cookies', e.navigateur?.cookies ? 'Actifs' : 'Non'],
      ['DNT', e.navigateur?.dnt],
      ['Online', e.navigateur?.online ? 'Oui' : 'Non'],
    ]},
    { icon:'💻', label:'Matériel', rows:[
      ['CPU cœurs', e.materiel?.cpu_coeurs, 'a3'],
      ['RAM', e.materiel?.ram_go ? e.materiel.ram_go+' Go' : 'N/A', 'a3'],
      ['GPU', e.materiel?.gpu],
      ['Résolution', e.materiel?.ecran],
      ['Dispo', e.materiel?.ecran_dispo],
      ['Pixel ratio', e.materiel?.ratio_pixel+'x'],
      ['Couleur', e.materiel?.couleur],
      ['Fenêtre', e.materiel?.fenetre],
      ['Orientation', e.materiel?.orientation],
      ['Tactile', e.materiel?.tactile ? 'Oui ('+e.materiel.touch_points+' pts)' : 'Non'],
    ]},
    { icon:'📶', label:'Réseau', rows:[
      ['Type', e.reseau?.type],
      ['Qualité', e.reseau?.effectiveType, 'a1'],
      ['Débit', e.reseau?.downlink],
      ['RTT', e.reseau?.rtt],
    ]},
    { icon:'🔋', label:'Batterie', rows:[
      ['Niveau', e.batterie?.level, 'a1'],
      ['En charge', e.batterie?.charging],
    ]},
    { icon:'🎛️', label:'Périphériques', rows:[
      ['Caméras', e.peripheriques?.cameras],
      ['Micros', e.peripheriques?.microphones],
      ['HP', e.peripheriques?.speakers],
    ]},
    { icon:'🕐', label:'Temps', rows:[
      ['Fuseau', e.temps?.fuseau],
      ['UTC offset', e.temps?.offset_utc],
    ]},
    { icon:'⚡', label:'Perf', rows:[
      ['Mém. JS', e.perf?.mem_js],
    ]},
  ];
  document.getElementById('dPanel').innerHTML = sections.map(s => `
    <div class="dsec">
      <div class="dsec-head"><span>${s.icon}</span><span>${s.label}</span></div>
      <div class="drows">${s.rows.filter(([,v])=>v!=null&&v!==undefined&&v!=='N/A').map(([k,v,cls])=>`
        <div class="drow"><span class="dk">${k}</span><span class="dv ${cls||''}">${v}</span></div>
      `).join('')}</div>
    </div>`).join('');
}

async function load() {
  const key = document.getElementById('keyInput').value.trim();
  const binId = getBinId();
  if (!key) { dbg('Master Key manquante', 'err'); return; }
  if (!binId) { dbg('Bin ID introuvable — visite d\'abord tracker.html pour créer le bin', 'warn'); toast('⚠ Pas de Bin ID'); return; }

  document.getElementById('binInput').value = binId;
  document.getElementById('liveStatus').textContent = 'CHARGEMENT…';
  dbg('Bin ID : ' + binId);
  dbg('→ Lecture JSONBin…');

  try {
    const t0 = performance.now();
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Master-Key': key, 'X-Bin-Meta': 'false' }
    });
    const ms = Math.round(performance.now()-t0);
    dbg('HTTP ' + res.status + ' en ' + ms + 'ms', res.ok?'ok':'err');
    if (!res.ok) { const t=await res.text(); dbg(t.substring(0,120),'err'); throw new Error('HTTP '+res.status); }
    const data = await res.json();
    const entries = Array.isArray(data) ? data : [];
    dbg(entries.length + ' entrée(s) reçue(s)', 'ok');
    allEntries = entries;
    renderStats(entries);
    renderList(entries);
    toast('✓ ' + entries.length + ' entrée(s)');
    document.getElementById('liveStatus').textContent = 'EN DIRECT';
  } catch(e) {
    dbg('Erreur : ' + e.message, 'err');
    document.getElementById('liveStatus').textContent = 'ERREUR';
    toast('✗ Erreur');
  }
}

async function clearAllData() {
  const key = document.getElementById('keyInput').value.trim();
  const binId = getBinId();
  if (!key||!binId) { toast('⚠ Clé ou Bin ID manquant'); return; }
  if (!confirm('Vider toutes les entrées ?')) return;
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':key},
      body:JSON.stringify([])
    });
    allEntries = [];
    renderStats([]);
    renderList([]);
    dbg('Bin vidé', 'ok');
    toast('✓ Données effacées');
  } catch(e) { dbg('Erreur vidage : '+e.message,'err'); }
}

// Auto-refresh 20s
const binId = localStorage.getItem(BIN_ID_KEY);
if (binId) { document.getElementById('binInput').value = binId; load(); }
setInterval(load, 20000);
</script>
</body>
</html>
